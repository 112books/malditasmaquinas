baseURL = "https://malditasmaquinas.com"
title = "malditas màquines"
defaultContentLanguage = "ca"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[build]
  writeStats = true

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false

# ── Idiomes ──────────────────────────────────────────────────────────────────

[languages]
  [languages.ca]
    languageName = "Català"
    languageCode = "ca"
    weight = 1
    contentDir = "content/ca"
    [languages.ca.params]
      description = "Consultoria tecnològica a demanda per a artistes, autònoms i petites empreses."

  [languages.es]
    languageName = "Castellano"
    languageCode = "es"
    weight = 2
    contentDir = "content/es"
    [languages.es.params]
      description = "Consultoría tecnológica a demanda para artistas, autónomos y pequeñas empresas."

# ── Menú principal ────────────────────────────────────────────────────────────

[[languages.ca.menus.main]]
  name = "serveis"
  url = "/serveis/"
  weight = 1

[[languages.ca.menus.main]]
  name = "com funciona"
  url = "/com-funciona/"
  weight = 2

[[languages.ca.menus.main]]
  name = "paquets"
  url = "/paquets/"
  weight = 3

[[languages.ca.menus.main]]
  name = "accés"
  url = "/app/"
  weight = 4

[[languages.es.menus.main]]
  name = "servicios"
  url = "/es/servicios/"
  weight = 1

[[languages.es.menus.main]]
  name = "cómo funciona"
  url = "/es/como-funciona/"
  weight = 2

[[languages.es.menus.main]]
  name = "paquetes"
  url = "/es/paquetes/"
  weight = 3

[[languages.es.menus.main]]
  name = "acceso"
  url = "/es/app/"
  weight = 4

# ── Paràmetres globals ────────────────────────────────────────────────────────

[params]
  author = "LinuxBCN"
  logo = "/svg/logo.svg"
  accentColor = "#FF6B00"  # taronja

  # Cloudflare Workers API
  apiBase = "https://malditasmaquinas.com/api"

  # Stripe — Payment Links (fase 1, sense backend)
  # Genera els enllaços al dashboard de Stripe i enganxa'ls aquí
  [params.stripe]
    [params.stripe.links]
      minim     = "https://buy.stripe.com/test_bJe9AU6Cx9JscvS2jTao801"
      basic     = "https://buy.stripe.com/test_8x28wQ2mh3l41RecYxao800"
      mitja     = "https://buy.stripe.com/test_fZu9AU9OJ1cWeE0f6Fao802"
      estandard = "https://buy.stripe.com/test_28E7sMd0V7BkgM88Ihao803"
      pro       = "https://buy.stripe.com/test_dRm14o6Cx6xgcvSgaJao804"
      avancat   = "https://buy.stripe.com/test_00w5kEf9308S53q0bLao805"

# ── Hugo Pipes / assets ───────────────────────────────────────────────────────

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "dracula"
