{{ if .Site.Params.stagingHash }}
<div id="pg-overlay" role="dialog" aria-modal="true" aria-label="Accés restringit">
  <div id="pg-box">
    <p id="pg-label">accés restringit_</p>
    <div id="pg-form">
      <input id="pg-input" type="password" placeholder="contrasenya" autocomplete="current-password" aria-label="Contrasenya">
      <button id="pg-btn" type="button">entrar</button>
    </div>
    <p id="pg-error" aria-live="polite"></p>
  </div>
</div>
<style>
  #pg-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg, #0d0c0b);
    align-items: center; justify-content: center;
  }
  #pg-overlay.visible {
    display: flex;
  }
  #pg-box {
    display: flex; flex-direction: column; gap: 1.5rem;
    width: min(380px, 90vw);
  }
  #pg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--cream2, #9a958e);
    margin: 0;
  }
  #pg-form {
    display: flex; gap: 0.5rem;
  }
  #pg-input {
    flex: 1;
    background: var(--bg2, #181714);
    border: 1px solid var(--line, #1e1c1a);
    color: var(--cream, #e2ddd6);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #pg-input:focus-visible {
    border-color: var(--rust2, #e04d10);
    outline: 2px solid var(--rust2, #e04d10);
    outline-offset: 2px;
  }
  #pg-btn {
    background: var(--rust2, #e04d10);
    color: var(--bg, #0d0c0b);
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #pg-btn:hover { background: var(--rust3, #ff6425); }
  #pg-btn:focus-visible {
    outline: 2px solid var(--rust2, #e04d10);
    outline-offset: 2px;
  }
  #pg-error {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--rust2, #e04d10);
    margin: 0; min-height: 1em;
  }
</style>
<script>
(function () {
  var HASH = '{{ .Site.Params.stagingHash }}';
  var KEY  = 'mm_staging_ok';

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function unlock() {
    var el = document.getElementById('pg-overlay');
    if (el) el.classList.remove('visible');
    document.body.style.overflow = '';
  }

  function lock() {
    var el = document.getElementById('pg-overlay');
    if (el) el.classList.add('visible');
    document.body.style.overflow = 'hidden';
    setTimeout(function(){ var i = document.getElementById('pg-input'); if(i) i.focus(); }, 50);
  }

  async function tryUnlock() {
    var input = document.getElementById('pg-input');
    var err   = document.getElementById('pg-error');
    var h = await sha256(input.value.trim());
    if (h === HASH) {
      sessionStorage.setItem(KEY, '1');
      unlock();
    } else {
      err.textContent = 'contrasenya incorrecta';
      input.value = '';
      input.focus();
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    if (sessionStorage.getItem(KEY) === '1') { return; }
    lock();
    document.getElementById('pg-btn').addEventListener('click', tryUnlock);
    document.getElementById('pg-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') tryUnlock();
      document.getElementById('pg-error').textContent = '';
    });
  });
})();
</script>
{{ end }}
