name = "malditasmaquinas-api"
main = "api/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Ruta (activar quan el domini estigui a Cloudflare) ───────────────────────
# route = { pattern = "malditasmaquinas.com/api/*", zone_name = "malditasmaquinas.com" }

# ── D1 (SQLite) ───────────────────────────────────────────────────────────────

[[d1_databases]]
  binding = "DB"
  database_name = "malditasmaquinas-db"
  database_id = "898b83eb-2463-4e13-b3ec-08cac3a7c89e"

# ── KV (sessions / cache) — activar quan calgui ──────────────────────────────
# [[kv_namespaces]]
#   binding = "KV"
#   id = "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

# ── R2 (fitxers adjunts) ─────────────────────────────────────────────────────
# Crear el bucket: wrangler r2 bucket create malditasmaquinas-files
[[r2_buckets]]
  binding = "R2"
  bucket_name = "malditasmaquinas-files"

# ── Secrets (mai al codi, pujar amb: wrangler secret put NOM) ────────────────
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# JWT_SECRET
# RESEND_API_KEY
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID
