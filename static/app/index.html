<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panell · MalditasMaquinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Galindo&family=IBM+Plex+Mono:wght@400;500&family=Bitter:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0c0b; --bg2:#181714; --bg3:#222020; --line:#1e1c1a;
      --cream:#e2ddd6; --cream2:#9a958e; --cream3:#5a5650;
      --rust:#bf3d08; --rust2:#e04d10; --rust3:#ff6425;
      --f-display:'Galindo',serif; --f-mono:'IBM Plex Mono',monospace; --f-body:'Bitter',serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--cream); font-family: var(--f-body); min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; }
    :focus-visible { outline: 2px solid var(--rust2); outline-offset: 2px; }

    /* ── Nav ── */
    .app-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem; border-bottom: 1px solid var(--line);
      position: sticky; top: 0; background: var(--bg); z-index: 50;
    }
    .app-brand { font-family: var(--f-display); font-size: 1.4rem; }
    .app-brand span { color: var(--rust2); }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-family: var(--f-mono); font-size: .72rem; color: var(--cream2); }
    .btn-logout {
      font-family: var(--f-mono); font-size: .7rem; color: var(--cream3);
      border: 1px solid var(--line); background: none; padding: .35rem .75rem;
      transition: all .15s;
    }
    .btn-logout:hover { color: var(--cream2); border-color: var(--cream3); }
    .app-back { font-family: var(--f-mono); font-size: .7rem; color: var(--cream3); letter-spacing: .06em; transition: color .15s; }
    .app-back:hover { color: var(--cream2); }

    /* ── Main ── */
    .app-main { flex: 1; padding: 3rem 2rem; max-width: 900px; width: 100%; margin: 0 auto; }
    .app-main--center { display: flex; align-items: center; justify-content: center; }

    /* ── Forms ── */
    .auth-box { width: 100%; max-width: 420px; }
    .auth-title { font-family: var(--f-display); font-size: 2.5rem; font-weight: 400; margin-bottom: .4rem; }
    .auth-sub { font-size: .9rem; color: var(--cream2); font-style: italic; margin-bottom: 2.5rem; line-height: 1.6; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-family: var(--f-mono); font-size: .62rem; color: var(--cream3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .45rem; }
    .form-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--line);
      color: var(--cream); font-family: var(--f-body); font-size: 1rem;
      padding: .75rem 1rem; outline: none; transition: border-color .15s;
      appearance: none; border-radius: 0;
    }
    .form-input:focus { border-color: var(--rust); }
    .form-input::placeholder { color: var(--cream3); }
    .btn-primary {
      width: 100%; font-family: var(--f-mono); font-size: .85rem; letter-spacing: .05em;
      background: var(--rust2); color: var(--cream); border: none;
      padding: .85rem; transition: background .15s; margin-top: .25rem;
    }
    .btn-primary:hover { background: var(--rust3); }
    .btn-primary:disabled { background: var(--bg3); color: var(--cream3); cursor: not-allowed; }
    .btn-secondary {
      font-family: var(--f-mono); font-size: .78rem; color: var(--cream3);
      border: 1px solid var(--line); background: none; padding: .6rem 1.2rem;
      transition: all .15s;
    }
    .btn-secondary:hover { color: var(--cream); border-color: var(--cream3); }
    .form-switch { margin-top: 1.5rem; font-family: var(--f-mono); font-size: .8rem; color: var(--cream2); }
    .form-switch a { color: var(--rust2); border-bottom: 1px solid var(--rust); font-size: .9rem; }
    .msg-box { margin-top: 1.5rem; padding: 1rem 1.25rem; background: var(--bg2); border-left: 2px solid var(--rust); font-size: .85rem; color: var(--cream2); line-height: 1.65; }
    .msg-box.ok { border-color: #4a7; color: var(--cream); }
    .msg-box.err { border-color: var(--rust2); color: var(--rust3); }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .loading-dot { font-family: var(--f-mono); font-size: .85rem; color: var(--cream3); letter-spacing: .2em; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    /* ── Dashboard ── */
    .dash-header { margin-bottom: 2.5rem; border-bottom: 1px solid var(--line); padding-bottom: 1.5rem; }
    .dash-title { font-family: var(--f-display); font-size: 2rem; font-weight: 400; margin-bottom: .25rem; }
    .dash-sub { font-size: .9rem; color: var(--cream2); font-style: italic; }

    .balance-bar {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 1.5rem; background: var(--bg2); border-left: 3px solid var(--rust2);
      margin-bottom: 2rem;
    }
    .balance-num { font-family: var(--f-display); font-size: 3rem; color: var(--rust2); line-height: 1; }
    .balance-label { font-family: var(--f-mono); font-size: .72rem; color: var(--cream2); letter-spacing: .08em; }
    .balance-buy { margin-left: auto; font-family: var(--f-mono); font-size: .75rem; background: var(--rust2); color: var(--cream); border: none; padding: .5rem 1rem; transition: background .15s; }
    .balance-buy:hover { background: var(--rust3); }

    .section-title { font-family: var(--f-mono); font-size: .7rem; color: var(--rust2); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 1rem; }

    /* ── Consultes llista ── */
    .consultation-list { display: flex; flex-direction: column; gap: 1px; background: var(--line); margin-bottom: 2rem; }
    .consultation-item {
      background: var(--bg); padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; transition: background .15s;
    }
    .consultation-item:hover { background: var(--bg2); }
    .ci-estat { font-family: var(--f-mono); font-size: .6rem; letter-spacing: .08em; padding: .2rem .5rem; white-space: nowrap; border-radius: 2px; }
    .ci-estat.pendent  { background: rgba(224,77,16,.2); color: var(--rust3); border: 1px solid var(--rust2); }
    .ci-estat.resposta { background: rgba(74,170,100,.15); color: #4aa864; border: 1px solid #4aa864; }
    .ci-estat.tancat   { background: var(--bg2); color: var(--cream3); border: 1px solid var(--line); }
    .consultation-item.pendent { border-left: 3px solid var(--rust2); }
    .consultation-item.resposta { border-left: 3px solid #4aa864; }
    .consultation-item.tancat  { border-left: 3px solid var(--line); opacity: .7; }
    .ci-titol { font-size: .95rem; color: var(--cream); flex: 1; }
    .ci-data  { font-family: var(--f-mono); font-size: .6rem; color: var(--cream3); white-space: nowrap; }
    .ci-user  { font-family: var(--f-mono); font-size: .65rem; color: var(--cream2); white-space: nowrap; }
    .empty-state { padding: 2rem; text-align: center; font-family: var(--f-mono); font-size: .8rem; color: var(--cream3); background: var(--bg2); }

    /* ── Detall consulta ── */
    .back-link { font-family: var(--f-mono); font-size: .72rem; color: var(--cream3); margin-bottom: 1.5rem; display: inline-block; border-bottom: 1px solid var(--line); padding-bottom: 2px; transition: color .15s; }
    .back-link:hover { color: var(--cream2); }
    .consultation-body { background: var(--bg2); padding: 1.5rem; margin-bottom: 1.5rem; border-left: 2px solid var(--line); white-space: pre-wrap; line-height: 1.75; color: var(--cream2); font-size: .95rem; }
    .response-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .response-item { background: var(--bg2); padding: 1.25rem 1.5rem; border-left: 2px solid var(--rust2); }
    .response-meta { font-family: var(--f-mono); font-size: .62rem; color: var(--cream3); margin-bottom: .5rem; }
    .response-text { white-space: pre-wrap; line-height: 1.75; font-size: .95rem; color: var(--cream); }
    .respond-form textarea {
      width: 100%; background: var(--bg2); border: 1px solid var(--line);
      color: var(--cream); font-family: var(--f-body); font-size: .95rem;
      padding: .75rem 1rem; outline: none; resize: vertical; min-height: 120px;
      transition: border-color .15s; border-radius: 0; appearance: none;
    }
    .respond-form textarea:focus { border-color: var(--rust); }
    .respond-actions { display: flex; gap: .75rem; margin-top: .75rem; }

    /* ── Paquets ── */
    .pkg-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); margin-bottom: 2rem; }
    .pkg-card { background: var(--bg); padding: 1.5rem; cursor: pointer; transition: background .15s; border-top: 2px solid transparent; }
    .pkg-card:hover, .pkg-card.selected { background: var(--bg2); border-top-color: var(--rust2); }
    .pkg-card-name { font-family: var(--f-mono); font-size: .68rem; color: var(--rust2); letter-spacing: .1em; margin-bottom: .5rem; }
    .pkg-card-hours { font-family: var(--f-display); font-size: 2.5rem; color: var(--cream); line-height: 1; }
    .pkg-card-unit { font-family: var(--f-mono); font-size: .62rem; color: var(--cream3); }
    .pkg-card-price { font-size: 1.3rem; color: var(--cream); margin-top: .5rem; }
    .pkg-cta-wrap { margin-top: 1.5rem; }
    .btn-stripe {
      display: inline-block; font-family: var(--f-mono); font-size: .85rem;
      background: var(--rust2); color: var(--cream); border: none;
      padding: .85rem 2rem; text-decoration: none; transition: background .15s;
    }
    .btn-stripe:hover { background: var(--rust3); }

    /* ── Admin ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); margin-bottom: 2rem; }
    .tab { font-family: var(--f-mono); font-size: .75rem; color: var(--cream3); padding: .75rem 1.5rem; border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab:hover { color: var(--cream2); }
    .tab.active { color: var(--rust2); border-bottom-color: var(--rust2); }
    .user-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .user-table th { font-family: var(--f-mono); font-size: .6rem; color: var(--rust2); letter-spacing: .08em; text-align: left; padding: .5rem .75rem; border-bottom: 1px solid var(--rust); }
    .user-table td { padding: .7rem .75rem; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .user-table tr:hover td { background: var(--bg2); }
    .badge { font-family: var(--f-mono); font-size: .58rem; padding: .2rem .45rem; letter-spacing: .06em; }
    .badge.pending  { background: var(--bg3); color: var(--cream3); border: 1px solid var(--line); }
    .badge.active   { background: rgba(74,170,100,.15); color: #4aa864; border: 1px solid #4aa864; }
    .badge.blocked  { background: rgba(224,77,16,.15); color: var(--rust2); border: 1px solid var(--rust); }
    .badge.admin    { background: rgba(224,77,16,.2); color: var(--rust3); border: 1px solid var(--rust2); }
    .btn-action { font-family: var(--f-mono); font-size: .65rem; padding: .25rem .6rem; border: 1px solid; background: none; transition: all .15s; margin-right: .25rem; }
    .btn-action.validate { color: #4aa864; border-color: #4aa864; }
    .btn-action.validate:hover { background: rgba(74,170,100,.15); }
    .btn-action.block { color: var(--rust2); border-color: var(--rust); }
    .btn-action.block:hover { background: rgba(224,77,16,.1); }

    /* ── Pending screen ── */
    .pending-box { text-align: center; max-width: 480px; }
    .pending-icon { font-size: 3rem; margin-bottom: 1.5rem; }
    .pending-title { font-family: var(--f-display); font-size: 2rem; font-weight: 400; margin-bottom: .75rem; }
    .pending-text { color: var(--cream2); line-height: 1.75; font-size: .95rem; }

    /* ── Footer ── */
    .app-footer { padding: 1rem 2rem; border-top: 1px solid var(--line); font-family: var(--f-mono); font-size: .6rem; color: var(--cream3); text-align: center; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .app-main { padding: 2rem 1.25rem; }
      .pkg-select { grid-template-columns: repeat(2, 1fr); }
      .tabs { overflow-x: auto; }
    }
    @media (max-width: 400px) {
      .pkg-select { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="app-nav">
  <a href="../" class="app-brand">Malditas<span>Maquinas</span>.</a>
  <div class="nav-actions">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-logout" id="btnLogout" style="display:none" onclick="App.logout()">sortir</button>
    <a href="../" class="app-back" id="navBack">← tornar</a>
  </div>
</nav>

<main class="app-main app-main--center" id="appMain">
  <div class="loading"><span class="loading-dot">carregant_</span></div>
</main>

<footer class="app-footer" id="appFooter">
  © <span id="footerYear"></span> malditasmaquinas.com
</footer>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────

const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8787/api'
  : 'https://malditasmaquinas-api.hola-78f.workers.dev/api';

const JWT_KEY = 'mm_jwt';

const PACKAGES = {
  minim:     { nom: 'mínim',     hores: 0.5, preu: 35,  caducitat: '1 mes',    link: 'https://buy.stripe.com/bJe7sM8Fzcf212z8R9ao807' },
  basic:     { nom: 'bàsic',     hores: 1,   preu: 60,  caducitat: '3 mesos',  link: 'https://buy.stripe.com/3cI00kdZT4MA9z55EXao806' },
  mitja:     { nom: 'mitjà',     hores: 3,   preu: 165, caducitat: '5 mesos',  link: 'https://buy.stripe.com/cNifZig814MA8v11oHao805' },
  estandard: { nom: 'estàndard', hores: 5,   preu: 260, caducitat: '7 mesos',  link: 'https://buy.stripe.com/dRmcN69JD5QE8v12sLao802' },
  pro:       { nom: 'pro',       hores: 10,  preu: 500, caducitat: '10 mesos', link: 'https://buy.stripe.com/6oU8wQdZT92Q5iP0kDao803' },
  avancat:   { nom: 'avançat',   hores: 20,  preu: 900, caducitat: '12 mesos', link: 'https://buy.stripe.com/bJe4gA9JDgvieTpgjBao804' },
};

// ── State ─────────────────────────────────────────────────────────────────────

const State = {
  user: null,
  jwt: localStorage.getItem(JWT_KEY),
  pendingPkg: null,
  adminTab: 'users',
  consultationDetail: null,
};

// ── API helpers ───────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (State.jwt) headers['Authorization'] = `Bearer ${State.jwt}`;
  const res = await fetch(API + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

// ── Render helpers ────────────────────────────────────────────────────────────

function el(id) { return document.getElementById(id); }

function setMain(html, center = false) {
  const main = el('appMain');
  main.innerHTML = html;
  main.className = center ? 'app-main app-main--center' : 'app-main';
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatHores(h) {
  if (!h || h <= 0) return '0 min';
  if (h < 1) return `${Math.round(h * 60)} min`;
  if (h === Math.floor(h)) return `${h}h`;
  const hInt = Math.floor(h);
  const min  = Math.round((h - hInt) * 60);
  return min > 0 ? `${hInt}h ${min}min` : `${hInt}h`;
}

function updateNav() {
  if (State.user) {
    el('navUser').textContent = State.user.nom || State.user.email;
    el('btnLogout').style.display = 'inline-block';
    el('navBack').style.display = 'none';
  } else {
    el('navUser').textContent = '';
    el('btnLogout').style.display = 'none';
    el('navBack').style.display = 'inline-block';
  }
}

// ── Auth ──────────────────────────────────────────────────────────────────────

async function verifyToken(token) {
  const { ok, data } = await api('GET', `/auth/verify?token=${encodeURIComponent(token)}`);
  if (ok && data.token) {
    State.jwt = data.token;
    State.user = data.user;
    localStorage.setItem(JWT_KEY, data.token);
    // Neteja el token de la URL
    history.replaceState({}, '', location.pathname + (State.pendingPkg ? `?pkg=${State.pendingPkg}` : ''));
    return true;
  }
  return false;
}

async function loadMe() {
  if (!State.jwt) return false;
  const { ok, data } = await api('GET', '/auth/me');
  if (ok) { State.user = data; return true; }
  State.jwt = null;
  localStorage.removeItem(JWT_KEY);
  return false;
}

// ── Views ─────────────────────────────────────────────────────────────────────

// ── Login ──

function showLogin(msg = '') {
  const pkgCtx = State.pendingPkg ? PACKAGES[State.pendingPkg] : null;
  setMain(`
    <div class="auth-box">
      <h1 class="auth-title">Accedeix.</h1>
      <p class="auth-sub">${pkgCtx
        ? `Vols el paquet <strong>${escHtml(pkgCtx.nom)}</strong> (${pkgCtx.hores}h · ${pkgCtx.preu} €). Accedeix primer al teu compte.`
        : 'El teu panell: hores, consultes i historial.'
      }</p>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Correu electrònic</label>
          <input class="form-input" type="email" id="loginEmail" required placeholder="tu@exemple.com" autocomplete="email">
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Envia el link d'accés</button>
      </form>
      ${msg ? `<div class="msg-box ok">${escHtml(msg)}</div>` : ''}
      <div id="loginMsg"></div>
      <p class="form-switch">Encara no tens compte? <a href="#" id="goRegister">Registra't</a></p>
    </div>
  `, true);

  el('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = el('loginBtn');
    btn.disabled = true; btn.textContent = 'Enviant…';
    const email = el('loginEmail').value.trim();
    const { ok, data } = await api('POST', '/auth/magic-link', { email });
    if (ok) {
      el('loginMsg').innerHTML = `<div class="msg-box ok">Link enviat! Comprova el correu (i la carpeta de spam).</div>`;
      btn.textContent = 'Enviat ✓';
    } else {
      el('loginMsg').innerHTML = `<div class="msg-box err">${escHtml(data.message || 'Error. Torna-ho a provar.')}</div>`;
      btn.disabled = false; btn.textContent = 'Envia el link d\'accés';
    }
  });
  el('goRegister').addEventListener('click', e => { e.preventDefault(); showRegister(); });
}

// ── Register ──

function showRegister() {
  const pkgCtx = State.pendingPkg ? PACKAGES[State.pendingPkg] : null;
  setMain(`
    <div class="auth-box">
      <h1 class="auth-title">Registre.</h1>
      <p class="auth-sub">${pkgCtx
        ? `Paquet seleccionat: <strong>${escHtml(pkgCtx.nom)}</strong> (${pkgCtx.hores}h · ${pkgCtx.preu} €). Crea el compte i t'avisem quan estigui actiu.`
        : 'Crea el teu compte. Validarem la sol·licitud en menys de 24h.'
      }</p>
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="regNom">Nom</label>
          <input class="form-input" type="text" id="regNom" required placeholder="Com et diem?" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Correu electrònic</label>
          <input class="form-input" type="email" id="regEmail" required placeholder="tu@exemple.com" autocomplete="email">
        </div>
        <button type="submit" class="btn-primary" id="regBtn">Crea el compte</button>
      </form>
      <div id="regMsg"></div>
      <p class="form-switch">Ja tens compte? <a href="#" id="goLogin">Accedeix</a></p>
    </div>
  `, true);

  el('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = el('regBtn');
    btn.disabled = true; btn.textContent = 'Enviant…';
    const nom   = el('regNom').value.trim();
    const email = el('regEmail').value.trim();
    const { ok, status, data } = await api('POST', '/auth/register', { nom, email });
    if (ok) {
      showPending(nom);
    } else if (status === 409 && data.error === 'ja_existeix') {
      el('regMsg').innerHTML = `<div class="msg-box">Aquest correu ja té compte. <a href="#" id="goLogin2" style="color:var(--rust2)">Accedeix amb magic link</a>.</div>`;
      el('goLogin2').addEventListener('click', e => { e.preventDefault(); showLogin(); });
      btn.disabled = false; btn.textContent = 'Crea el compte';
    } else if (status === 409) {
      el('regMsg').innerHTML = `<div class="msg-box err">${escHtml(data.message || 'Compte ja existent.')}</div>`;
      btn.disabled = false; btn.textContent = 'Crea el compte';
    } else {
      el('regMsg').innerHTML = `<div class="msg-box err">${escHtml(data.error || 'Error. Torna-ho a provar.')}</div>`;
      btn.disabled = false; btn.textContent = 'Crea el compte';
    }
  });
  el('goLogin').addEventListener('click', e => { e.preventDefault(); showLogin(); });
}

// ── Pending ──

function showPending(nom) {
  setMain(`
    <div class="pending-box">
      <div class="pending-icon">⏳</div>
      <h2 class="pending-title">Gràcies, ${escHtml(nom || '')}.</h2>
      <p class="pending-text">Hem rebut el teu registre. Revisarem el compte i t'enviarem un correu quan estigui actiu.<br><br>Habitualment menys de 24h en dies laborables.</p>
      <br>
      <a href="../" style="font-family:var(--f-mono);font-size:.75rem;color:var(--cream3);border-bottom:1px solid var(--line);">← tornar al web</a>
    </div>
  `, true);
}

// ── Dashboard client ──

async function showClient() {
  setMain('<div class="loading"><span class="loading-dot">carregant_</span></div>');

  let balRes, consRes;
  try {
    [balRes, consRes] = await Promise.all([
      api('GET', '/hours/balance'),
      api('GET', '/consultations'),
    ]);
  } catch (err) {
    console.error('showClient error:', err);
    setMain('<div class="auth-box"><div class="msg-box err">Error de connexió. <button class="btn-primary" onclick="location.reload()">Reintenta</button></div></div>', true);
    return;
  }

  const hores = balRes.ok ? (balRes.data.hores_disponibles ?? 0) : 0;
  const cons  = consRes.ok ? consRes.data : [];

  // Si ve d'un paquet pendent, mostra selecció de paquets primer
  const pkgHtml = State.pendingPkg ? renderPkgSelector(State.pendingPkg) : '';

  setMain(`
    <div class="dash-header">
      <h1 class="dash-title">Hola, ${escHtml(State.user.nom || 'client')}.</h1>
      <p class="dash-sub">El teu panell de control.</p>
    </div>

    ${pkgHtml}

    <div class="balance-bar">
      <span class="balance-num">${formatHores(hores)}</span>
      <span class="balance-label">disponibles</span>
      <button class="balance-buy" onclick="App.showBuyPkg()">comprar hores →</button>
    </div>

    ${hores >= 0.25 && cons.length === 0 ? `
    <div style="margin-bottom:2rem;padding:1.75rem;background:var(--bg2);border-left:3px solid var(--rust2);text-align:center;">
      <p style="font-family:var(--f-mono);font-size:.8rem;color:var(--cream2);margin-bottom:1.25rem;">Tens <strong style="color:var(--rust2)">${formatHores(hores)}</strong> disponibles. Envia la primera consulta i et responem en menys de 24h.</p>
      <button class="btn-primary" onclick="App.showNewConsultation()" style="font-size:1rem;padding:1rem 2rem;">+ nova consulta</button>
    </div>
    ` : `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <span class="section-title">consultes</span>
      <button class="btn-secondary" onclick="App.showNewConsultation()" ${hores < 0.25 ? 'disabled title="Cal tenir almenys 0.25h disponibles"' : ''}>+ nova consulta</button>
    </div>
    `}

    <div class="consultation-list" id="consList">
      ${cons.length === 0 && hores < 0.25
        ? '<div class="empty-state">Compra hores per poder enviar consultes.</div>'
        : cons.length === 0 ? ''
        : cons.map(c => renderConsItem(c)).join('')
      }
    </div>
  `);

  el('consList')?.querySelectorAll('.consultation-item').forEach(item => {
    item.addEventListener('click', () => App.showConsultation(item.dataset.id));
  });

  if (State.pendingPkg) {
    el('consList')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function renderConsItem(c, showUser = false) {
  return `
    <div class="consultation-item ${escHtml(c.estat)}" data-id="${escHtml(c.id)}">
      <span class="ci-estat ${escHtml(c.estat)}">${escHtml(c.estat)}</span>
      <span class="ci-titol">${escHtml(c.titol || '(sense títol)')}</span>
      ${showUser ? `<span class="ci-user">${escHtml(c.nom || c.email || '')}</span>` : ''}
      <span class="ci-data">${formatDate(c.created_at)}</span>
    </div>
  `;
}

function renderPkgSelector(selectedKey) {
  return `
    <div style="margin-bottom:2rem;padding:1.5rem;background:var(--bg2);border-left:3px solid var(--rust2)">
      <p class="section-title" style="margin-bottom:1.25rem;">paquet seleccionat</p>
      <div class="pkg-cta-wrap">
        ${Object.entries(PACKAGES).map(([key, pkg]) => `
          <div class="pkg-card ${key === selectedKey ? 'selected' : ''}" style="display:inline-block;margin-right:1px;margin-bottom:1px;min-width:120px;" onclick="App.selectPkg('${key}')">
            <div class="pkg-card-name">${escHtml(pkg.nom)}</div>
            <div class="pkg-card-hours">${pkg.hores}</div>
            <div class="pkg-card-unit">${pkg.hores === 1 ? 'hora' : 'hores'}</div>
            <div class="pkg-card-price">${pkg.preu} €</div>
          </div>
        `).join('')}
      </div>
      ${renderPkgLink(selectedKey)}
    </div>
  `;
}

function renderPkgLink(key) {
  const pkg = PACKAGES[key];
  if (!pkg) return '';
  return `
    <div style="margin-top:1.25rem;">
      <a href="${escHtml(pkg.link)}" class="btn-stripe" target="_blank" rel="noopener noreferrer">
        comprar ${escHtml(pkg.nom)} — ${pkg.preu} € + iva →
      </a>
      <p style="margin-top:.75rem;font-family:var(--f-mono);font-size:.65rem;color:var(--cream3);">Caduca en ${escHtml(pkg.caducitat)}. Paga amb Stripe (targeta, Bizum…).</p>
    </div>
  `;
}

// ── Comprar paquets ──

function showBuyPkg(preselect) {
  State.pendingPkg = preselect || State.pendingPkg || 'estandard';
  setMain(`
    <div>
      <a href="#" class="back-link" id="backDash">← tornar al panell</a>
      <div class="dash-header">
        <h2 class="dash-title">Compra hores.</h2>
        <p class="dash-sub">Tria el paquet i paga amb Stripe.</p>
      </div>
      <div class="pkg-select" id="pkgGrid">
        ${Object.entries(PACKAGES).map(([key, pkg]) => `
          <div class="pkg-card ${key === State.pendingPkg ? 'selected' : ''}" data-pkg="${key}">
            <div class="pkg-card-name">${escHtml(pkg.nom)}</div>
            <div class="pkg-card-hours">${pkg.hores}</div>
            <div class="pkg-card-unit">${pkg.hores === 1 ? 'hora' : 'hores'}</div>
            <div class="pkg-card-price">${pkg.preu} €</div>
            <div style="font-family:var(--f-mono);font-size:.6rem;color:var(--cream3);margin-top:.4rem;">${escHtml(pkg.caducitat)}</div>
          </div>
        `).join('')}
      </div>
      <div id="pkgLink">${renderPkgLink(State.pendingPkg)}</div>
    </div>
  `);

  el('backDash').addEventListener('click', e => { e.preventDefault(); State.pendingPkg = null; showClient(); });
  el('pkgGrid').querySelectorAll('.pkg-card').forEach(card => {
    card.addEventListener('click', () => {
      State.pendingPkg = card.dataset.pkg;
      el('pkgGrid').querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      el('pkgLink').innerHTML = renderPkgLink(State.pendingPkg);
    });
  });
}

// ── Nova consulta ──

function showNewConsultation() {
  setMain(`
    <div>
      <a href="#" class="back-link" id="backDash">← tornar al panell</a>
      <div class="dash-header">
        <h2 class="dash-title">Nova consulta.</h2>
        <p class="dash-sub">Explica el problema. Com més detall, millor resposta. Es descomptaran 0.25h.</p>
      </div>
      <form id="consForm">
        <div class="form-group">
          <label class="form-label" for="consTitol">Títol (opcional)</label>
          <input class="form-input" type="text" id="consTitol" placeholder="Resum breu del problema">
        </div>
        <div class="form-group">
          <label class="form-label" for="consPregunta">Consulta *</label>
          <textarea class="form-input" id="consPregunta" required rows="8" placeholder="Descriu el problema amb detall: sistema operatiu, programari, missatges d'error, passos per reproduir-lo…" style="resize:vertical;"></textarea>
        </div>
        <div style="display:flex;gap:.75rem;">
          <button type="submit" class="btn-primary" id="consBtn" style="width:auto;padding:.85rem 2rem;">Envia la consulta</button>
        </div>
      </form>
      <div id="consMsg"></div>
    </div>
  `);

  el('backDash').addEventListener('click', e => { e.preventDefault(); showClient(); });
  el('consForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = el('consBtn');
    btn.disabled = true; btn.textContent = 'Enviant…';
    const titol    = el('consTitol').value.trim();
    const pregunta = el('consPregunta').value.trim();
    const { ok, status, data } = await api('POST', '/consultations', { titol, pregunta });
    if (ok) {
      el('consMsg').innerHTML = '<div class="msg-box ok">Consulta enviada. T\'avisarem per correu quan tinguem resposta.</div>';
      btn.textContent = 'Enviada ✓';
      setTimeout(() => showClient(), 2000);
    } else if (status === 402) {
      el('consMsg').innerHTML = `<div class="msg-box err">${escHtml(data.message)}</div>`;
      btn.disabled = false; btn.textContent = 'Envia la consulta';
    } else {
      el('consMsg').innerHTML = `<div class="msg-box err">Error en enviar. Torna-ho a provar.</div>`;
      btn.disabled = false; btn.textContent = 'Envia la consulta';
    }
  });
}

// ── Detall consulta ──

async function showConsultation(id) {
  setMain('<div class="loading"><span class="loading-dot">carregant_</span></div>');
  const { ok, data } = await api('GET', `/consultations/${id}`);
  if (!ok) { showClient(); return; }

  const isAdmin = State.user.role === 'admin';
  const respostes = data.respostes || [];

  setMain(`
    <div>
      <a href="#" class="back-link" id="backCons">← tornar</a>
      <div class="dash-header">
        <h2 class="dash-title">${escHtml(data.titol || 'Consulta')}</h2>
        <p class="dash-sub">
          <span class="ci-estat ${escHtml(data.estat)}" style="display:inline-block;">${escHtml(data.estat)}</span>
          &nbsp;·&nbsp; ${formatDate(data.created_at)}
          ${data.nom ? ` &nbsp;·&nbsp; ${escHtml(data.nom)} (${escHtml(data.email)})` : ''}
        </p>
      </div>

      <p class="section-title">consulta</p>
      <div class="consultation-body">${escHtml(data.pregunta)}</div>

      ${respostes.length > 0 ? `
        <p class="section-title">respostes</p>
        <div class="response-list">
          ${respostes.map(r => `
            <div class="response-item">
              <div class="response-meta">${escHtml(r.admin_nom || 'admin')} · ${formatDate(r.created_at)}</div>
              <div class="response-text">${escHtml(r.text)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${isAdmin && data.estat !== 'tancat' ? `
        <p class="section-title">respondre</p>
        <div class="respond-form">
          <textarea id="respText" placeholder="Escriu la resposta…"></textarea>
          <div class="respond-actions">
            <button class="btn-primary" id="btnRespond" style="width:auto;padding:.75rem 1.5rem;">Envia resposta</button>
            <button class="btn-secondary" id="btnClose">Tanca la consulta</button>
          </div>
        </div>
        <div id="respondMsg"></div>
      ` : ''}

      ${!isAdmin && data.estat !== 'tancat' ? `
        <button class="btn-secondary" id="btnClose" style="margin-top:1rem;">Tancar la consulta</button>
        <div id="respondMsg"></div>
      ` : ''}
    </div>
  `);

  el('backCons').addEventListener('click', e => {
    e.preventDefault();
    isAdmin ? showAdmin() : showClient();
  });

  el('btnRespond')?.addEventListener('click', async () => {
    const text = el('respText').value.trim();
    if (!text) return;
    const btn = el('btnRespond');
    btn.disabled = true; btn.textContent = 'Enviant…';
    const { ok } = await api('POST', `/consultations/${id}/respond`, { text });
    if (ok) {
      el('respondMsg').innerHTML = '<div class="msg-box ok">Resposta enviada. El client rep un correu.</div>';
      setTimeout(() => showConsultation(id), 1500);
    } else {
      el('respondMsg').innerHTML = '<div class="msg-box err">Error en enviar.</div>';
      btn.disabled = false; btn.textContent = 'Envia resposta';
    }
  });

  el('btnClose')?.addEventListener('click', async () => {
    const { ok } = await api('PUT', `/consultations/${id}/close`);
    if (ok) showConsultation(id);
  });
}

// ── Admin dashboard ──

async function showAdmin(tab) {
  if (tab) State.adminTab = tab;
  setMain('<div class="loading"><span class="loading-dot">carregant_</span></div>');

  let usersRes, consRes;
  try {
    [usersRes, consRes] = await Promise.all([
      api('GET', '/admin/users'),
      api('GET', '/consultations'),
    ]);
  } catch (err) {
    console.error('showAdmin error:', err);
    setMain('<div class="auth-box"><div class="msg-box err">Error de connexió. <button class="btn-primary" onclick="location.reload()">Reintenta</button></div></div>', true);
    return;
  }

  const users = usersRes.ok ? usersRes.data : [];
  const cons  = consRes.ok  ? consRes.data  : [];
  const pendingCount = users.filter(u => u.status === 'pending').length;

  setMain(`
    <div class="dash-header">
      <h1 class="dash-title">Admin.</h1>
      <p class="dash-sub">${users.length} usuaris · ${cons.filter(c => c.estat === 'pendent').length} consultes pendents · <a href="#" onclick="event.preventDefault();showClient()" style="color:var(--rust2);font-family:var(--f-mono);font-size:.8rem;">veure panell client →</a></p>
    </div>

    <div class="tabs">
      <button class="tab ${State.adminTab === 'users' ? 'active' : ''}" onclick="App.showAdmin('users')">
        usuaris${pendingCount > 0 ? ` (${pendingCount} pendents)` : ''}
      </button>
      <button class="tab ${State.adminTab === 'cons' ? 'active' : ''}" onclick="App.showAdmin('cons')">
        consultes
      </button>
    </div>

    ${State.adminTab === 'users' ? renderUsersTab(users) : renderAdminConsTab(cons)}
  `);

  el('adminContent')?.querySelectorAll('.consultation-item').forEach(item => {
    item.addEventListener('click', () => App.showConsultation(item.dataset.id));
  });
}

function renderUsersTab(users) {
  if (!users.length) return '<div class="empty-state">Cap usuari.</div>';
  return `
    <div style="overflow-x:auto;">
      <table class="user-table">
        <thead>
          <tr>
            <th>Nom</th><th>Email</th><th>Rol</th><th>Estat</th><th>Hores</th><th>Registre</th><th>Accions</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td>${escHtml(u.nom || '—')}</td>
              <td style="font-family:var(--f-mono);font-size:.78rem;">${escHtml(u.email)}</td>
              <td><span class="badge ${u.role === 'admin' ? 'admin' : ''}">${escHtml(u.role)}</span></td>
              <td><span class="badge ${escHtml(u.status)}">${escHtml(u.status)}</span></td>
              <td style="font-family:var(--f-mono);font-size:.78rem;">${formatHores(parseFloat(u.hores_disponibles || 0))}</td>
              <td style="font-family:var(--f-mono);font-size:.68rem;color:var(--cream3);">${formatDate(u.created_at)}</td>
              <td>
                ${u.status === 'pending' ? `<button class="btn-action validate" onclick="App.validateUser('${escHtml(u.id)}')">validar</button>` : ''}
                ${u.status !== 'blocked' && u.role !== 'admin' ? `<button class="btn-action block" onclick="App.blockUser('${escHtml(u.id)}')">bloquejar</button>` : ''}
                ${u.status === 'blocked' ? `<button class="btn-action validate" onclick="App.validateUser('${escHtml(u.id)}')">desbloquear</button>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderAdminConsTab(cons) {
  if (!cons.length) return '<div class="empty-state">Cap consulta.</div>';
  return `
    <div class="consultation-list" id="adminContent">
      ${cons.map(c => renderConsItem(c, true)).join('')}
    </div>
  `;
}

// ── App controller ────────────────────────────────────────────────────────────

const App = {
  logout() {
    State.jwt = null; State.user = null;
    localStorage.removeItem(JWT_KEY);
    updateNav();
    showLogin();
  },
  showBuyPkg(key) { showBuyPkg(key); },
  showNewConsultation() { showNewConsultation(); },
  showConsultation(id) { showConsultation(id); },
  showAdmin(tab) { showAdmin(tab); },
  selectPkg(key) { State.pendingPkg = key; },
  async validateUser(id) {
    const { ok } = await api('PUT', `/admin/users/${id}/validate`);
    if (ok) showAdmin();
  },
  async blockUser(id) {
    if (!confirm('Bloquejar aquest usuari?')) return;
    const { ok } = await api('PUT', `/admin/users/${id}/block`);
    if (ok) showAdmin();
  },
};

// ── Boot ──────────────────────────────────────────────────────────────────────

async function boot() {
  el('footerYear').textContent = new Date().getFullYear();

  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const pkg    = params.get('pkg');

  if (pkg && PACKAGES[pkg]) State.pendingPkg = pkg;

  // 1. Magic link a la URL
  if (token) {
    try {
      const ok = await verifyToken(token);
      if (!ok) {
        updateNav();
        setMain('<div class="auth-box"><div class="msg-box err">El link ha caducat o ja s\'ha usat. Sol·licita un de nou.</div><br><button class="btn-primary" onclick="App.logout()">Torna al login</button></div>', true);
        return;
      }
    } catch (err) {
      console.error('verifyToken error:', err);
      updateNav();
      setMain('<div class="auth-box"><div class="msg-box err">Error de connexió amb el servidor. Torna-ho a provar.</div><br><button class="btn-primary" onclick="location.reload()">Reintenta</button></div>', true);
      return;
    }
  }

  // 2. JWT existent
  if (State.jwt && !State.user) {
    try { await loadMe(); } catch { State.jwt = null; localStorage.removeItem(JWT_KEY); }
  }

  updateNav();

  // 3. Ruta
  if (!State.user) {
    State.pendingPkg ? showRegister() : showLogin();
    return;
  }

  if (State.user.status === 'pending') { showPending(State.user.nom); return; }
  if (State.user.status === 'blocked') {
    setMain('<div class="auth-box"><div class="msg-box err">El compte ha estat bloquejat. Contacta amb hola@malditasmaquinas.com.</div></div>', true);
    return;
  }

  if (State.pendingPkg) { showBuyPkg(State.pendingPkg); return; }

  if (State.user.role === 'admin') { showAdmin(); return; }

  showClient();
}

boot().catch(err => {
  console.error('boot error:', err);
  setMain('<div class="auth-box"><div class="msg-box err">Error inesperat. <button class="btn-primary" onclick="location.reload()">Reintenta</button></div></div>', true);
});
</script>
