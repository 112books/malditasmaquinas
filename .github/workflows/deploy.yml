name: desplega hugo a github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: instal·la hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.0'
          extended: true

      - name: configura pages
        id: pages
        uses: actions/configure-pages@v5

      - name: build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: puja artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: desplega a github pages
        id: deployment
        uses: actions/deploy-pages@v4